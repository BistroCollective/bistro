<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bistro - Events</title>
    <link rel="icon" href="img/favicon.png">
    <!-- DNS prefetch for external resources -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Spicy+Rice&display=swap"
        rel="stylesheet" media="print" onload="this.media='all'">
    <noscript>
        <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Spicy+Rice&display=swap"
            rel="stylesheet">
    </noscript>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
</head>

<body>
    <video autoplay loop muted playsinline webkit-playsinline preload="auto" poster="img/bg.jpg" class="bg-video"
        id="bgVideo">
        <source src="img/bgvideo.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>

    <header class="header events-header">
        <button class="hamburger-btn" onclick="openMenu()">
            <svg viewBox="0 0 100 80" width="30" height="30" fill="white">
                <rect width="100" height="15"></rect>
                <rect y="30" width="100" height="15"></rect>
                <rect y="60" width="100" height="15"></rect>
            </svg>
        </button>
        <h1 data-i18n="title-future-events">Future Events</h1>
        <a href="index.html" class="events-logo-link">
            <img src="img/logonobg.png" alt="Bistro Logo" class="events-logo">
        </a>
    </header>

    <nav id="sideMenu" class="side-menu">
        <a href="javascript:void(0)" class="close-btn" onclick="closeMenu()">&times;</a>
        <a href="index.html" class="menu-link"><svg viewBox="0 0 24 24" class="menu-icon">
                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
            </svg><span data-i18n="nav-home">Home</span></a>
        <a href="events.html" class="menu-link"><svg viewBox="0 0 24 24" class="menu-icon">
                <path
                    d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z" />
            </svg><span data-i18n="nav-events">Events</span></a>
        <a href="about.html" class="menu-link"><svg viewBox="0 0 24 24" class="menu-icon">
                <path
                    d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z" />
            </svg><span data-i18n="nav-about">Who are we?</span></a>
    </nav>

    <div class="event-image-container">
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide"><img src="img/evento.jpg" alt="Event 0" class="event-image"></div>
                <div class="swiper-slide"><img src="img/evento1.jpg" alt="Event 1" class="event-image"></div>
                <div class="swiper-slide"><img src="img/evento2.jpg" alt="Event 2" class="event-image"></div>
                <div class="swiper-slide"><img src="img/evento3.jpg" alt="Event 3" class="event-image"></div>
            </div>
            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>
        </div>
    </div>

    <div style="text-align: center; margin-bottom: 40px;">
        <h3 data-i18n="Coming-soon" style="color: white; font-size: 2rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">New
            events coming soon</h3>
    </div>


    <footer class="footer">
        <div class="lang-switcher">
            <button class="lang-toggle-btn" onclick="toggleLang()">IT</button>
        </div>
        <div class="footer-contacts">
            <p data-i18n="footer-contacts">Contacts:</p>
            <ul>
                <li>
                    <img src="img/emailicon.png" alt="Email" class="contact-icon" loading="lazy">
                    Email: <span class=""> collettivobistro@gmail.com</span>
                </li>
                <li>
                    <img src="img/igicon.png" alt="Instagram" class="contact-icon" loading="lazy">
                    Instagram: <a href="https://instagram.com/bistrolab_" target="_blank" class="">
                        @bistrolab_</a>
                </li>
            </ul>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js" defer></script>
    <script src="lang.js" defer></script>
    <script>
        // Safari video autoplay fix
        document.addEventListener('DOMContentLoaded', function () {
            var vid = document.getElementById('bgVideo');
            if (vid) {
                vid.play().catch(function () {
                    document.body.addEventListener('touchstart', function () { vid.play(); }, { once: true });
                    document.body.addEventListener('click', function () { vid.play(); }, { once: true });
                });
            }
        });

        function openMenu() {
            document.getElementById("sideMenu").style.left = "0";
        }
        function closeMenu() {
            document.getElementById("sideMenu").style.left = "-250px";
        }

        document.addEventListener('DOMContentLoaded', function () {
            var swiper = new Swiper(".mySwiper", {
                loop: true,
                autoplay: {
                    delay: 8000,
                    disableOnInteraction: false,
                },
                navigation: {
                    nextEl: ".swiper-button-next",
                    prevEl: ".swiper-button-prev",
                },
            });
        });
    </script>
</body>

</html>
