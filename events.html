<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Upcoming Bistro Collective events – live music, art, and culture between Romagna and Lombardia.">
    <title>Bistro - Events</title>
    <link rel="icon" href="img/favicon.png">
    <!-- DNS prefetch for external resources -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Spicy+Rice&display=swap"
        rel="stylesheet" media="print" onload="this.media='all'">
    <noscript>
        <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Spicy+Rice&display=swap"
            rel="stylesheet">
    </noscript>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
</head>

<body>
    <video autoplay loop muted playsinline webkit-playsinline preload="auto" poster="img/bg.jpg" class="bg-video"
        id="bgVideo">
        <source src="img/bgvideo.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>

    <header class="header events-header">
        <button class="hamburger-btn" onclick="openMenu()" aria-label="Open menu">
            <svg viewBox="0 0 100 80" width="30" height="30" fill="white">
                <rect width="100" height="15"></rect>
                <rect y="30" width="100" height="15"></rect>
                <rect y="60" width="100" height="15"></rect>
            </svg>
        </button>
        <h1 data-i18n="title-future-events">Future Events</h1>
        <a href="index.html" class="events-logo-link">
            <img src="img/logonobg.png" alt="Bistro Logo" class="events-logo" width="800" height="800" decoding="async">
        </a>
    </header>

    <nav id="sideMenu" class="side-menu">
        <a href="javascript:void(0)" class="close-btn" onclick="closeMenu()" aria-label="Close menu">&times;</a>
        <a href="index.html" class="menu-link"><svg viewBox="0 0 24 24" class="menu-icon">
                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
            </svg><span data-i18n="nav-home">Home</span></a>
        <a href="events.html" class="menu-link"><svg viewBox="0 0 24 24" class="menu-icon">
                <path
                    d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z" />
            </svg><span data-i18n="nav-events">Events</span></a>
        <a href="about.html" class="menu-link"><svg viewBox="0 0 24 24" class="menu-icon">
                <path
                    d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z" />
            </svg><span data-i18n="nav-about">Who are we?</span></a>
    </nav>

    <!-- Events page content: relative wrapper -->
    <div class="events-page-content">

        <!-- Main events area: big text at top -->
        <div class="events-main-area">
            <p class="coming-soon-text" data-i18n="Coming-soon">Altro in arrivo</p>
            <p class="stay-tuned-text" data-i18n="stay-tuned">STAY TUNED</p>
        </div>

        <!-- Last events card: title + thumbnail, like artists section -->
        <div class="last-events-section">
            <h2 class="last-events-title" data-i18n="last-events">Ultimi eventi</h2>
            <div class="mini-thumb-wrapper" id="miniThumb" onclick="openLightbox(0)" title="Apri galleria">
                <img src="img/evento.jpg" alt="Evento" class="mini-thumb-img" loading="lazy" decoding="async">
                <div class="mini-thumb-overlay">
                    <svg viewBox="0 0 24 24" class="mini-thumb-icon">
                        <path
                            d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" />
                    </svg>
                </div>
            </div>
        </div>

    </div><!-- /.events-page-content -->

    <!-- Lightbox -->
    <div class="lightbox-overlay" id="lightboxOverlay" onclick="closeLightboxOutside(event)">
        <button class="lightbox-close" id="lightboxClose" onclick="closeLightbox()" aria-label="Close">&times;</button>

        <div class="lightbox-content">
            <div class="swiper lightboxSwiper" id="lightboxSwiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide"><img src="img/evento.jpg" alt="Event 0" class="lightbox-img" decoding="async"></div>
                    <div class="swiper-slide"><img src="img/evento1.jpg" alt="Event 1" class="lightbox-img" decoding="async"></div>
                    <div class="swiper-slide"><img src="img/evento2.jpg" alt="Event 2" class="lightbox-img" decoding="async"></div>
                    <div class="swiper-slide"><img src="img/evento3.jpg" alt="Event 3" class="lightbox-img" decoding="async"></div>
                </div>
                <div class="swiper-button-next"></div>
                <div class="swiper-button-prev"></div>
                <div class="swiper-pagination"></div>
            </div>

            <!-- Instagram info link -->
            <a href="https://www.instagram.com/p/DW1C6LmDUtD/?img_index=1"
               target="_blank" rel="noopener noreferrer"
               class="lightbox-ig-link"
               onclick="event.stopPropagation()">
                <img src="img/igicon.png" alt="Instagram" class="lightbox-ig-icon">
                <span data-i18n="more-info">Più info qui</span>
            </a>
        </div>

    </div>

    <footer class="footer">
        <div class="lang-switcher">
            <button class="lang-toggle-btn" onclick="toggleLang()">IT</button>
        </div>
        <div class="footer-contacts">
            <p data-i18n="footer-contacts">Contacts:</p>
            <ul>
                <li>
                    <img src="img/emailicon.png" alt="Email" class="contact-icon" width="48" height="48" loading="lazy"
                        decoding="async">
                    Email: <span class="">collettivobistro@gmail.com</span>
                </li>
                <li>
                    <img src="img/igicon.png" alt="Instagram" class="contact-icon" width="48" height="48" loading="lazy"
                        decoding="async">
                    Instagram: <a href="https://instagram.com/bistrolab_" target="_blank" rel="noopener noreferrer"
                        class="">
                        @bistrolab_</a>
                </li>
            </ul>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="lang.js" defer></script>
    <script src="main.js" defer></script>
    <script>
        // Lightbox swiper instance
        var lightboxSwiper = null;

        function openLightbox(startIndex) {
            var overlay = document.getElementById('lightboxOverlay');
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';

            if (!lightboxSwiper) {
                lightboxSwiper = new Swiper('#lightboxSwiper', {
                    loop: true,
                    initialSlide: startIndex || 0,
                    navigation: {
                        nextEl: '#lightboxSwiper .swiper-button-next',
                        prevEl: '#lightboxSwiper .swiper-button-prev',
                    },
                    pagination: {
                        el: '#lightboxSwiper .swiper-pagination',
                        clickable: true,
                    },
                    keyboard: { enabled: true },
                });
            } else {
                lightboxSwiper.slideTo(startIndex || 0, 0);
            }
        }

        function closeLightbox() {
            var overlay = document.getElementById('lightboxOverlay');
            overlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        function closeLightboxOutside(e) {
            if (e.target === document.getElementById('lightboxOverlay')) {
                closeLightbox();
            }
        }

        // Close on Escape key
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') closeLightbox();
        });
    </script>
</body>

</html>
